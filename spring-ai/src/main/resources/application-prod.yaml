spring:
  application:
    name: spring-ai
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    openai:
      # 建议通过环境变量传入，更安全
      api-key: ${AI_API_KEY:sk-525a693004904976bb3fd698ef4434f6}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-plus
          temperature: 0.8
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境数据库配置 - 请根据实际情况修改
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/spring_ai?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:spring_ai}
    password: ${DB_PASSWORD:123456}
    # HikariCP 连接池优化
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      # 生产环境Redis配置 - 请根据实际情况修改
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 10s
      password: ${REDIS_PASSWORD:}

# 服务器配置
server:
  port: ${SERVER_PORT:9090}

# 生产环境日志配置
logging:
  level:
    org.springframework.ai.chat.client.advisor: info
    com.example.ai: info
  file:
    name: logs/spring-ai.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
